services:
  postgres:
    image: postgres:16-alpine
    container_name: cmdmvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cmdmvp
      POSTGRES_USER: cmdmvp_user
      POSTGRES_PASSWORD: cmdmvp_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmdmvp_user -d cmdmvp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
